{{ define "main" }}
<article class="homepage">

  <div class="homepage-opening">
    <h1 class="homepage-title">{{ .Title }}</h1>
    {{ with .Params.pairs }}
    <div class="homepage-lead">
      <span class="homepage-lead-line">Why do</span>
      <span class="cycle cycle--noun">{{ range $i, $p := . }}<span class="cycle-item"{{ if $i }} aria-hidden="true"{{ end }}>{{ $p.noun }}</span>{{ end }}</span>
      <span class="cycle cycle--verb">{{ range $i, $p := . }}<span class="cycle-item"{{ if $i }} aria-hidden="true"{{ end }}>{{ $p.verb }}</span>{{ end }}</span>
    </div>
    {{ end }}
  </div>

  <div class="container">
    {{ with .Params.threads }}
    <div class="homepage-threads">
      {{ range . }}
      <a href="{{ .url }}" class="homepage-thread homepage-thread--{{ .section }}">
        <span class="homepage-thread-heading">{{ .heading }}</span>
        <span class="homepage-thread-blurb">{{ .blurb }}</span>
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>

</article>
{{ end }}
