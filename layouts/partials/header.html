<header class="site-header">
  <div class="container">
    <a href="/" class="site-title" aria-label="Fund Your Internet — home">
      <span class="site-mark" aria-hidden="true">FYI</span>
      <span class="site-name">Fund Your Internet</span>
    </a>
    <nav aria-label="Main navigation">
      <ul>
        {{- $rel := .RelPermalink -}}
        {{- range .Site.Menus.main }}
        {{- $active := hasPrefix $rel .URL -}}
        <li><a href="{{ .URL }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{- end }}
      </ul>
    </nav>
  </div>
</header>
