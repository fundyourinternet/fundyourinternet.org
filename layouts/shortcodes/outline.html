{{- with .Page.Params.outline -}}
<nav class="page-outline" aria-label="In this section">
  <ol class="page-outline-list">
    {{- range . }}
    <li class="page-outline-item">
      <a href="#{{ .anchor }}">
        <span class="page-outline-icon">{{ partial "section-icon.html" .icon }}</span>
        <span class="page-outline-title">{{ .title }}</span>
        <span class="page-outline-desc">{{ .description }}</span>
      </a>
    </li>
    {{- end }}
  </ol>
</nav>
<nav class="section-progress" aria-label="Reading progress" hidden>
  <div class="section-progress-track">
    {{- range . }}
    <a href="#{{ .anchor }}" class="section-progress-step" data-section="{{ .anchor }}" aria-label="{{ .title }}">
      {{ partial "section-icon.html" .icon }}
    </a>
    {{- end }}
  </div>
  <span class="section-progress-title"></span>
</nav>
{{- end -}}
