baseURL = "https://fundyourinternet.org/"
languageCode = "en-GB"
title = "Fund Your Internet"
disableKinds = ["taxonomy"]
ignoreLogs = ['warning-goldmark-raw-html']

[params]
  description = "A practical guide to sustaining the things you rely on online."
  repository = "https://github.com/fundyourinternet/fundyourinternet.org"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

[menus]
  [[menus.main]]
    name = "Why do good apps get worse?"
    url = "/"
    weight = -1
  [[menus.main]]
    name = "How did we get here?"
    pageRef = "/the-old-way"
    weight = 1
  [[menus.main]]
    name = "Is there another way?"
    pageRef = "/a-new-way"
    weight = 2
  [[menus.main]]
    name = "What can I do?"
    pageRef = "/what-can-i-do"
    weight = 3
