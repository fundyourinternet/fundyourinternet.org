annotation: >
  Deloitte's annual consumer survey covering streaming, social media, and
  digital entertainment. The 2025 edition finds that 47% of consumers feel
  overwhelmed by subscription management, 75% are frustrated by recurring
  price increases, and 61% would cancel their favourite streaming service
  over a $5 monthly increase. Documents the broader subscription fatigue
  environment in which news competes for wallet share against entertainment.
