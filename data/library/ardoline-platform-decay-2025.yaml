id: "ardoline-platform-decay-2025"
title: "The Cognitive and Moral Harms of Platform Decay"
author: "Michael J. Ardoline, Edward Lenzo"
year: 2025
url: "https://link.springer.com/article/10.1007/s10676-025-09846-1"
type: research
topics:
  - platform-economics
  - attention-economics
annotation: >
  A philosophy paper in Ethics and Information Technology arguing that platform
  decay constitutes genuine cognitive and moral harm. Using the extended mind
  framework, the authors show that when platforms degrade, they damage users'
  cognitive capacities and undermine conditions for developing virtuous character.
  A rigorous philosophical complement to empirical accounts of platform decline.
