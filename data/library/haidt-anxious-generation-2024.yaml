id: "haidt-anxious-generation-2024"
title: "The Anxious Generation: How the Great Rewiring of Childhood Is Causing an Epidemic of Mental Illness"
author: "Jonathan Haidt"
year: 2024
url: "https://jonathanhaidt.com/anxious-generation/"
type: book
topics:
  - ad-driven-wellbeing
  - attention-economics
annotation: >
  The bestselling book arguing that smartphones and social media have driven
  a rise in youth anxiety and depression. Strongest where it catalogues
  mechanisms of harm (sleep deprivation, attention fragmentation, social
  comparison) and weakest where it claims a single causal story. Should be
  read alongside Vuorre and Przybylski's more cautious findings.
recommended: false
