id: "bonifacio-patreon-labour-2023"
title: "Beyond Fans: The Relational Labor and Communication Practices of Creators on Patreon"
author: "Ross Bonifacio, Lee Hair, Donghee Yvette Wohn"
year: 2023
url: "https://journals.sagepub.com/doi/abs/10.1177/14614448211027961"
type: research
topics:
  - direct-funding-models
annotation: >
  Qualitative study based on interviews with 21 Patreon creators examining the
  relational labour required to sustain a patronage income. Creators construct
  relationships with patrons ranging from transactional to familial, and
  emotional support from patrons is as important as financial support for
  sustainability. Reveals the hidden labour costs of direct-funding models
  that aggregate statistics often obscure.
recommended: false
