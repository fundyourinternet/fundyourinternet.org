annotation: >
  Pew's regularly updated fact sheet compiling industry data on newspaper
  circulation, advertising revenue, and newsroom employment over time. Print
  advertising revenue has fallen from roughly $49 billion in 2006 to a fraction
  of that, and digital advertising has never come close to replacing it.
  Valuable as a longitudinal data source.
