id: "vuorre-wellbeing-internet-2024"
title: "Global Well-Being and Mental Health in the Internet Age"
author: "Matti Vuorre, Andrew K. Przybylski"
year: 2024
url: "https://journals.sagepub.com/doi/10.1177/21677026231207791"
type: research
topics:
  - ad-driven-wellbeing
annotation: >
  A large-scale study in Clinical Psychological Science analysing data from
  2.4 million people across 168 countries over two decades. Finds only small
  and inconsistent changes in global wellbeing and mental health, with no
  consistent link to internet and mobile broadband adoption. The most important
  counterweight to simplistic "social media is destroying mental health"
  narratives. Does not dismiss harm, but insists on precision about its scale.
recommended: true
