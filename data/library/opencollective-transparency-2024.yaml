annotation: >
  The annual board report from the largest fiscal host on Open Collective,
  covering $12.5 million in contributions received in 2024 and $9.7 million
  paid out to maintainers across 3,500 open source projects. The report
  itself embodies the platform's transparency model: every line of revenue
  and expenditure is publicly visible. A real-world proof point that
  community-funded infrastructure can operate at meaningful scale.
