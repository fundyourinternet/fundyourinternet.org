id: "gollmitzer-journalism-cooperatives-2024"
title: "Journalism cooperatives' organisational traits and journalistic missions"
author: "Mirjam Gollmitzer"
year: 2024
url: "https://journals.sagepub.com/doi/10.1177/14648849241285505"
type: research
topics:
  - direct-funding-models
  - journalism-economics
annotation: >
  The first systematic inventory of journalism cooperatives worldwide,
  mapping 29 reader-owned newsrooms across three continents. Analyses
  their revenue sources, governance structures, and editorial missions,
  showing how cooperative ownership produces journalism that is
  structurally independent of both advertisers and platform algorithms.
  Covers named examples including The Bristol Cable and The Ferret.
