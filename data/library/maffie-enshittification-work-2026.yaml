id: "maffie-enshittification-work-2026"
title: "The Enshittification of Work: Platform Decay and Labour Conditions in the Gig Economy"
author: "Michael D. Maffie, Hector Hurtado"
year: 2026
url: "https://onlinelibrary.wiley.com/doi/10.1111/bjir.70004"
type: research
topics:
  - platform-economics
annotation: >
  Published in the British Journal of Industrial Relations, this peer-reviewed
  study extends the concept of enshittification from social media platforms to
  labour conditions. Based on 30 interviews with long-term gig workers, it
  identifies three mechanisms of value extraction over time: burden shifting,
  feature alteration, and market manipulation. Moves the enshittification
  framework from polemic to empirical labour research.
