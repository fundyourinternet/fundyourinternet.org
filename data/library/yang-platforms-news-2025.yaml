id: "yang-platforms-news-2025"
title: "More Platforms, Less Attention to News? A Multi-Platform Analysis of News Exposure"
author: "Tian Yang, Sandra Gonzalez-Bailon"
year: 2025
url: "https://journals.sagepub.com/doi/abs/10.1177/14614448251341496"
type: research
topics:
  - algorithmic-feeds
  - journalism-economics
annotation: >
  Analyses news exposure across TV, web, and YouTube for roughly 55,000
  panellists over 39 months. Television still dominates news consumption at
  a ratio of more than five to one over online sources, complicating narratives
  about algorithmic feeds replacing traditional media.
