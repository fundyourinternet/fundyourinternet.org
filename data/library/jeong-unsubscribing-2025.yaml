id: "jeong-unsubscribing-2025"
title: "Unsubscribing From Over-the-Top: How Subscription Fatigue and Mental Coupling Affect Multi-Homing Users"
author: "DongA Jeong, Sang Woo Lee"
year: 2025
url: "https://journals.sagepub.com/doi/10.1177/21582440251397865"
type: research
topics:
  - subscription-fatigue
annotation: >
  Peer-reviewed study examining the psychological mechanisms behind subscription
  cancellation. Identifies two distinct factors: "subscription fatigue" (the
  burden of managing multiple platforms) and "mental coupling" (the constant
  cost-benefit evaluation users perform). Coupling is the stronger driver of
  cancellation, suggesting that perceived value relative to cost matters more
  than sheer subscription volume.
