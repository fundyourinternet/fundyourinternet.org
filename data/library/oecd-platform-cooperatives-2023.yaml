annotation: >
  An OECD working paper providing the most comprehensive institutional overview
  of platform cooperatives as employment alternatives to conventional gig
  platforms. Documents working conditions, challenges in scaling, and policy
  recommendations. Moves beyond individual patronage models to examine
  structurally different ownership forms for digital platforms.
