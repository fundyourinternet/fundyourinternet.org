id: "oecd-platform-cooperatives-2023"
title: "Platform Cooperatives and Employment: An Alternative for Platform Work"
author: "OECD"
year: 2023
url: "https://www.oecd.org/en/publications/platform-cooperatives-and-employment_3eab339f-en.html"
type: report
topics:
