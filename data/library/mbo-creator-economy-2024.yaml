title: "Creator Economy Trends Report 2024"
author: "MBO Partners"
year: 2024
url: "https://www.mbopartners.com/state-of-independence/creator-economy-report/"
type: report
topics:
  - journalism-economics
  - platform-economics
annotation: >
  Annual survey tracking 8.9 million independent content creators in the US.
  The income distribution data is stark: 71% earn under $30,000 annually, only
  9% exceed $100,000, and 34% make less than $5,000. Useful for grounding
  conversations about the "creator economy" in the reality that most participants
  are earning supplementary income, not a living.
