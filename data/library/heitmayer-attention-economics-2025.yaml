id: "heitmayer-attention-economics-2025"
title: "Second Wave of Attention Economics: Attention as a Universal Symbolic Currency on Social Media and Beyond"
author: "Maxi Heitmayer"
year: 2025
url: "https://academic.oup.com/iwc/article/37/1/18/7733851"
type: research
topics:
  - attention-economics
  - platform-economics
annotation: >
  Proposes a model for understanding attention as a currency that can be
  accumulated and exchanged, distinguishing between "calcified" attention
  (stored metrics such as follower counts) and "flow" attention (real-time
  engagement). Updates the theoretical framework of attention economics for
  the social media era.
