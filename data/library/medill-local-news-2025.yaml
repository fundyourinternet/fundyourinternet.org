id: "medill-local-news-2025"
title: "The State of Local News 2025"
author: "Medill School of Journalism / Northwestern Local News Initiative"
year: 2025
url: "https://localnewsinitiative.northwestern.edu/projects/state-of-local-news/2025/"
type: report
topics:
  - journalism-economics
annotation: >
  The definitive annual accounting of local news in America. The 2025 edition
  documents 213 news desert counties (a record), 136 newspaper closures in a
  single year, and a 45% plunge in web traffic to the 100 largest newspapers
  over four years. Also tracks the countertrend: over 300 digital news startups
  in five years, though overwhelmingly concentrated in metro areas.
recommended: true
access: open
