id: "wikimedia-fundraising-2024"
title: "Fundraising Report 2023-2024"
author: "Wikimedia Foundation"
year: 2024
url: "https://meta.wikimedia.org/wiki/Fundraising/2023-24_Report"
type: report
topics:
  - direct-funding-models
annotation: >
  Detailed data on one of the largest digital public-good fundraising operations
  in the world. Over 8 million donors across 200 countries gave an average of
  $10.58 in FY 2023-24, sustaining $168 million in revenue. The declining
  average donation size and the operation's reliance on banner campaigns provide
  a real-world case study in both the potential and the fragility of grassroots
  digital giving at scale.
recommended: false
access: open
