annotation: >
  Goldman Sachs estimates the total addressable market for the creator economy
  at $250 billion in 2025, growing to $480 billion by 2027. Only about 4% of
  global creators earn more than $100,000 annually, with brand deals constituting
  roughly 70% of revenue. Useful for scale and growth data, though its framing
  is oriented toward investor opportunity rather than creator welfare.
