id: "vanolst-social-media-interventions-2023"
title: "The Impact of Social Media Use Interventions on Mental Well-Being: Systematic Review"
author: "Mariek M. P. van Olst, Hanneke Hendriks, Eline S. Smit"
year: 2023
url: "https://www.jmir.org/2023/1/e44922"
type: research
topics:
  - ad-driven-wellbeing
annotation: >
  A systematic review examining whether interventions that change social media
  use actually improve mental wellbeing. Finds that interventions are effective,
  especially for depression and when therapy-based approaches are used.
  Practically useful because it moves beyond correlation to test whether
  changing behaviour changes outcomes.
recommended: false
access: open
