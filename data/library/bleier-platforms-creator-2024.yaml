annotation: >
  A peer-reviewed study in the International Journal of Research in Marketing
  mapping the roles platforms play in the creator economy: connecting actors,
  supporting content creation, and facilitating monetisation. Provides a useful
  academic framework for understanding creator-platform dependencies and the
  structural power platforms hold over funding flows.
