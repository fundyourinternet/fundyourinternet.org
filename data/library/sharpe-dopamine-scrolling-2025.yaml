id: "sharpe-dopamine-scrolling-2025"
title: "Dopamine-Scrolling: A Modern Public Health Challenge Requiring Urgent Attention"
author: "B. T. Sharpe, R. A. Spooner"
year: 2025
url: "https://journals.sagepub.com/doi/10.1177/17579139251331914"
type: research
topics:
  - attention-economics
  - ad-driven-wellbeing
annotation: >
  Distinguishes "dopamine-scrolling" from doom-scrolling as a distinct
  behavioural pattern driven by variable reinforcement schedules rather than
  anxiety. Identifies the pursuit of novel, entertaining content and rapid
  platform switching as a reward-mechanism-driven habit with public health
  implications.
