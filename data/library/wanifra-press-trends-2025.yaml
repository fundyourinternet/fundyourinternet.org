title: "World Press Trends Outlook 2024-2025"
author: "WAN-IFRA (World Association of News Publishers)"
year: 2025
url: "https://wan-ifra.org/insight/world-press-trends-outlook-2024-2025/"
type: report
topics:
  - journalism-economics
annotation: >
  A global survey of over 240 publishers across 85 countries documenting the
  structural shift in news revenue. For the first time, print circulation and
  advertising account for less than half of publisher revenue, while digital
  revenue has crossed the 30% threshold. Essential for understanding the global
  picture beyond US-centric data.
