id: "tan-recurring-crowdfunding-2024"
title: "Sustainable Funding for Small Businesses: An Investigation into the Dynamics of the Recurring Crowdfunding Model"
author: "Yee Heng Tan, Srinivas K. Reddy"
year: 2024
url: "https://journals.sagepub.com/doi/abs/10.1177/02662426231205758"
type: research
topics:
  - direct-funding-models
  - subscription-fatigue
annotation: >
  Peer-reviewed study analysing 3,229 crowd patronage projects (Patreon-style
  recurring funding, as opposed to one-off Kickstarter-style campaigns). Finds
  that incentivising mechanisms (tiered rewards, exclusive content) have a
  long-term impact on patronage sustainability, while project characteristics
  have only short-term effects. One of the few rigorous empirical studies of
  the recurring funding model that underpins much independent media.
recommended: false
access: paywalled
