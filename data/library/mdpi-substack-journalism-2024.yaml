annotation: >
  Peer-reviewed study examining whether newsletter platforms like Substack
  represent a genuine alternative media space or reproduce existing journalistic
  hierarchies. The most successful newsletters are overwhelmingly authored by
  already-established journalists, and algorithmic recommendations increasingly
  shape subscription behaviour.
