title: "The Attention Merchants: The Epic Scramble to Get Inside Our Heads"
author: "Tim Wu"
year: 2016
url: "https://www.penguinrandomhouse.com/books/234876/the-attention-merchants-by-tim-wu/"
type: book
topics:
