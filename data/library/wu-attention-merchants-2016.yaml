annotation: >
  The foundational history of attention as a commodity, tracing the business
  model of "free content in exchange for attention, sold to advertisers" from
  penny newspapers through radio, television, and into the internet age. Wu
  shows how every new medium eventually becomes an advertising platform.
  Essential historical context.
